<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 LED Control</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
    #ledStatus { font-size: 22px; margin-top: 20px; }
  </style>
  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <h1>ESP32 LED Control</h1>
  <button onclick="turnOn()">Turn ON</button>
  <button onclick="turnOff()">Turn OFF</button>
  <div id="ledStatus">LED State: Unknown</div>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBtWVz9zCzdNcZqX3MAzRUO2_tBFusypSI",
      authDomain: "firstproject-b43c4.firebaseapp.com",
      databaseURL: "https://firstproject-b43c4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "firstproject-b43c4",
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to turn LED ON
    function turnOn() {
      db.ref("/led").set(1);
    }

    // Function to turn LED OFF
    function turnOff() {
      db.ref("/led").set(0);
    }

    // Listen to LED state changes in real-time
    const ledRef = db.ref("/led");
    ledRef.on("value", (snapshot) => {
      const state = snapshot.val();
      document.getElementById("ledStatus").innerText = "LED State: " + (state == 1 ? "ON" : "OFF");
    });
  </script>
</body>
</html>
