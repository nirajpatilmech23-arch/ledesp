<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Bubble Monitor</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
    }

    .bubble {
      width: 50px;
      height: 50px;
      background: limegreen;
      border-radius: 50%;
      display: inline-block;
      margin: 10px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
  </style>
</head>
<body>

<h1 style="color:white;">ESP32 Bubble Counter</h1>
<div id="bubbleContainer"></div>

<script>
  var firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "https://firstproject-b43c4-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  var database = firebase.database();

  var bubbleRef = database.ref("/device/bubbleCount");

  bubbleRef.on("value", function(snapshot) {
    var count = snapshot.val();
    var container = document.getElementById("bubbleContainer");
    container.innerHTML = "";

    for (var i = 0; i < count; i++) {
      var bubble = document.createElement("div");
      bubble.className = "bubble";
      container.appendChild(bubble);
    }
  });
</script>

</body>
</html>
