<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Rising Bubble Monitor</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

    .bubble {
      width: 50px;
      height: 50px;
      background: limegreen;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      animation: rise 4s linear forwards;
    }

    @keyframes rise {
      from {
        bottom: 0;
        opacity: 1;
      }
      to {
        bottom: 100%;
        opacity: 0;
      }
    }
  </style>
</head>

        createBubble();
      }

      lastCount = count;
    }
  });
